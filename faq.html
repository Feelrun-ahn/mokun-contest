<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="mogun-logo.png">
<link rel="stylesheet" href="app.css?v=4">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>FAQ · 문의 · 목운중 교복 디자인 공모전</title>
</head>
<body>

<div class="page-head">
  <div class="wrap">
    <div class="crumb"><a href="index.html">홈</a> › FAQ · 문의</div>
    <h1>자주 묻는 질문</h1>
    <p>궁금한 점을 먼저 확인하고, 없으면 아래에서 학생회에 직접 문의하세요.</p>
  </div>
</div>
<section class="section" style="padding-top:32px">
  <div class="wrap" style="max-width:820px">
    <div id="faqs"></div>
    <div class="card mt-32" id="askCard">
      <h2 style="font-size:19px;margin-bottom:4px">문의하기</h2>
      <p class="muted" style="font-size:14px;margin-bottom:18px">학생회가 확인 후 연락처로 답변드립니다.</p>
      <form id="askForm">
        <div class="grid-2">
          <div class="field"><label>이름 <span class="req">*</span></label>
            <input class="input" name="name" placeholder="홍길동" required></div>
          <div class="field" id="f-phone"><label>연락처 <span class="req">*</span></label>
            <input class="input" name="phone" inputmode="tel" placeholder="010-1234-5678" required>
            <div class="hint">답변받을 번호를 정확히 적어주세요.</div></div>
        </div>
        <div class="field"><label>문의 내용 <span class="req">*</span></label>
          <textarea class="textarea" name="question" required placeholder="궁금한 점을 자세히 적어주세요. 접수 관련 문의는 접수번호도 함께 적어주시면 빠릅니다."></textarea></div>
        <button class="btn btn-primary btn-block">문의 보내기</button>
      </form>
    </div>
    <div class="card mt-24 center hide" id="askDone">
      <div style="font-size:36px;margin-bottom:8px">📨</div>
      <h2 style="font-size:19px;margin-bottom:6px">문의가 접수되었습니다</h2>
      <p class="muted">학생회가 확인 후 빠르게 답변드리겠습니다.</p>
      <button class="btn btn-line mt-16" onclick="location.reload()">추가로 문의하기</button>
    </div>
  </div>
</section>

<script src="config.js?v=4"></script>
<script src="common.js?v=4"></script>
<script>

mountLayout('faq.html');

(async function () {
  const faqs = await DB.faqs();
  document.getElementById('faqs').innerHTML = faqs.map(f => `
    <div class="faq-item">
      <button class="faq-q" onclick="this.parentElement.classList.toggle('open')">
        <span class="q">Q</span><span>${esc(f.q)}</span><span class="arrow">▾</span>
      </button>
      <div class="faq-a"><div>${esc(f.a).replace(/\n/g, '<br>')}</div></div>
    </div>`).join('');
})();

document.getElementById('askForm').addEventListener('submit', async e => {
  e.preventDefault();
  const f = e.target;
  try {
    await DB.inquire(f.name.value.trim(), f.phone.value.trim(), f.question.value.trim());
    document.getElementById('askCard').classList.add('hide');
    document.getElementById('askDone').classList.remove('hide');
  } catch (err) { toast(err.message, true); }
});

</script>
</body>
</html>
